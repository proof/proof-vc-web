<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>proof-vc-web test site</title>
    <style>
      body {
        margin: 0;
        font-family:
          "Inter",
          ui-sans-serif,
          system-ui,
          -apple-system;
      }
      .row {
        padding: 24px 32px;
        display: flex;
        gap: 24px;
        align-items: center;
        flex-wrap: wrap;
        border-bottom: 1px solid #eaeaef;
      }
      .row__label {
        width: 80px;
        font-size: 12px;
        color: #6a6a76;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <span class="row__label">dark</span>
      <proof-verify-id nonce="123" theme="dark" size="icon"></proof-verify-id>
      <proof-verify-id nonce="123" theme="dark" size="small"></proof-verify-id>
      <proof-verify-id
        nonce="123"
        theme="dark"
        size="medium"
        data-tx
      ></proof-verify-id>
      <proof-verify-id nonce="123" theme="dark" size="large"></proof-verify-id>
    </div>
    <div class="row">
      <span class="row__label">gray</span>
      <proof-verify-id nonce="123" theme="gray" size="icon"></proof-verify-id>
      <proof-verify-id nonce="123" theme="gray" size="small"></proof-verify-id>
      <proof-verify-id nonce="123" theme="gray" size="medium"></proof-verify-id>
      <proof-verify-id nonce="123" theme="gray" size="large"></proof-verify-id>
    </div>
    <div class="row">
      <span class="row__label">outline</span>
      <proof-verify-id
        nonce="123"
        theme="outline"
        size="icon"
      ></proof-verify-id>
      <proof-verify-id
        nonce="123"
        theme="outline"
        size="small"
      ></proof-verify-id>
      <proof-verify-id
        nonce="123"
        theme="outline"
        size="medium"
      ></proof-verify-id>
      <proof-verify-id
        nonce="123"
        theme="outline"
        size="large"
      ></proof-verify-id>
    </div>
    <div class="row">
      <span class="row__label">primary</span>
      <proof-verify-id
        nonce="123"
        theme="primary"
        size="icon"
      ></proof-verify-id>
      <proof-verify-id
        nonce="123"
        theme="primary"
        size="small"
      ></proof-verify-id>
      <proof-verify-id nonce="123"></proof-verify-id>
      <proof-verify-id
        nonce="123"
        theme="primary"
        size="large"
      ></proof-verify-id>
    </div>
  </body>
</html>
