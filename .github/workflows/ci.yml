name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: yarn
      - run: corepack enable
      - run: yarn install
      - run: yarn format:check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: yarn
      - run: corepack enable
      - run: yarn install
      - run: yarn lint:check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: yarn
      - run: corepack enable
      - run: yarn install
      - run: yarn typecheck

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: yarn
      - run: corepack enable
      - run: yarn install
      - run: yarn build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 1

  publint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: yarn
      - run: corepack enable
      - run: yarn install
      # publint resolves the package `exports` against the packed tarball, which
      # references ./dist/*. Reuse the build job's output instead of rebuilding.
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - run: yarn publint

  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: yarn
          cache-dependency-path: |
            yarn.lock
            site/yarn.lock
      - run: corepack enable
      # The site imports ../../src/index.ts, which re-exports from
      # @proof.com/proof-vc-common. That package only resolves from the root
      # node_modules, so the root install is required before the site checks.
      - run: yarn install
      - run: yarn install
        working-directory: site
      - run: yarn format:check
        working-directory: site
      - run: yarn lint:check
        working-directory: site
      - run: yarn typecheck
        working-directory: site
      - run: yarn build
        working-directory: site
