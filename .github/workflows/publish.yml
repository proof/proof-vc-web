name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      # Actions are pinned to commit SHAs (not tags) — this job has
      # id-token: write for npm Trusted Publishing, so a repointed tag must
      # not be able to alter what runs. Bump the SHA + comment together.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so the on-main check below can run
      - run: corepack enable
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          registry-url: https://registry.npmjs.org
          cache: yarn
      - run: yarn install
      - run: yarn lint:check
      - run: yarn typecheck
      - run: yarn build
      # Node-side checks of the built artifact (bundle self-contained, SSR-safe
      # import). dist exists after build.
      - run: yarn test:node
      - run: yarn publint
      - name: Verify tag matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: package.json=$PKG_VERSION, tag=$TAG_VERSION"
            exit 1
          fi
      - name: Verify the release commit is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release commit $GITHUB_SHA is not on origin/main; refusing to publish."
            exit 1
          fi
      - run: npm publish --provenance --access public
